<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin" />
  <title>Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header>
      <nav>
        <a href="/" class="">home</a>
        <a href="/projects/" class="">projects</a>
      </nav>
    </header>

    <main>
      <div class="not-found">
    <h1 class="dropshadow">404</h1>
    <a href="/">&larr; return home</a>
</div>

    </main>

    <footer>
      <div class="footer-name">PP</div>
    </footer>
  </div>

  <script>
    // Random slant for email hover on each entry
    (function() {
      const email = document.querySelector('h2 a.caution-hover');
      if (!email) return;
      email.addEventListener('mouseenter', function() {
        const deg = (Math.random() * 10 - 5).toFixed(2);
        this.style.setProperty('--slant', deg + 'deg');
      });
    })();
  </script>
</body>
</html>
